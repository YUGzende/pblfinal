<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoanIQ — Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card fade-in">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">💳</div>
      <div class="auth-logo-text">Loan<span>IQ</span></div>
    </div>

    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Start your loan evaluation journey today</p>

    <!-- Alert box -->
    <div id="alertBox" class="alert hidden"></div>

    <!-- Signup Form -->
    <form id="signupForm" novalidate>

      <div class="form-group">
        <label for="su_name">Full Name</label>
        <input type="text" id="su_name" placeholder="e.g. Rahul Sharma" autocomplete="name">
        <div class="error-msg" id="su_name_err"></div>
      </div>

      <div class="form-group">
        <label for="su_email">Email Address</label>
        <input type="email" id="su_email" placeholder="you@example.com" autocomplete="email">
        <div class="error-msg" id="su_email_err"></div>
      </div>

      <div class="form-group">
        <label for="su_username">Username</label>
        <input type="text" id="su_username" placeholder="e.g. rahul_2024" autocomplete="username">
        <div class="error-msg" id="su_username_err"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="su_password">Password</label>
          <input type="password" id="su_password" placeholder="Min. 6 characters" autocomplete="new-password">
          <div class="error-msg" id="su_password_err"></div>
        </div>
        <div class="form-group">
          <label for="su_confirm">Confirm Password</label>
          <input type="password" id="su_confirm" placeholder="Repeat password" autocomplete="new-password">
          <div class="error-msg" id="su_confirm_err"></div>
        </div>
      </div>

      <button type="submit" id="signupBtn" class="btn btn-primary" style="margin-top:8px;">
        Create Account
      </button>

    </form>

    <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>

  </div>

  <script src="script.js"></script>
</body>
</html>
