<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoanIQ — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card fade-in">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">💳</div>
      <div class="auth-logo-text">Loan<span>IQ</span></div>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to your LoanIQ account</p>

    <!-- Alert box -->
    <div id="alertBox" class="alert hidden"></div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="l_email">Email Address</label>
        <input type="email" id="l_email" placeholder="you@example.com" autocomplete="email">
        <div class="error-msg" id="l_email_err"></div>
      </div>

      <div class="form-group">
        <label for="l_password">Password</label>
        <input type="password" id="l_password" placeholder="Your password" autocomplete="current-password">
        <div class="error-msg" id="l_password_err"></div>
      </div>

      <button type="submit" id="loginBtn" class="btn btn-primary" style="margin-top:8px;">
        Sign In
      </button>

    </form>

    <!-- Demo hint -->
    <div style="background:var(--blue-50);border:1px solid var(--blue-100);border-radius:var(--radius-sm);padding:12px 14px;margin-top:20px;font-size:0.82rem;color:var(--blue-700);">
      <strong>Admin:</strong> <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="4e2f2a2327200e22212f20602d2123">[email&#160;protected]</a> / admin123
    </div>

        <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>

  </div>

  <!-- ✅ IMPORTANT: JS file -->
  <script src="script.js"></script>

</body>
</html>
